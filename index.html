<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script>
// カラー+マスク合成シェーダー
AFRAME.registerComponent('alpha-video', {
  schema: {
    color: { type: 'selector' },
    mask: { type: 'selector' },
    width: { type: 'number', default: 1 },
    height: { type: 'number', default: 1 }
  },
  
  init: function () {
    const colorVideo = this.data.color;
    const maskVideo = this.data.mask;
    const width = this.data.width;
    const height = this.data.height;
    
    const colorTexture = new THREE.VideoTexture(colorVideo);
    colorTexture.minFilter = THREE.LinearFilter;
    colorTexture.magFilter = THREE.LinearFilter;
    
    const maskTexture = new THREE.VideoTexture(maskVideo);
    maskTexture.minFilter = THREE.LinearFilter;
    maskTexture.magFilter = THREE.LinearFilter;
    
    const material = new THREE.ShaderMaterial({
      uniforms: {
        colorMap: { value: colorTexture },
        maskMap: { value: maskTexture }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D colorMap;
        uniform sampler2D maskMap;
        varying vec2 vUv;
        
        void main() {
          vec4 color = texture2D(colorMap, vUv);
          vec4 mask = texture2D(maskMap, vUv);
          float alpha = (mask.r + mask.g + mask.b) / 3.0;
          gl_FragColor = vec4(color.rgb, alpha);
        }
      `,
      transparent: true,
      side: THREE.DoubleSide
    });
    
    const geometry = new THREE.PlaneGeometry(width, height);
    const mesh = new THREE.Mesh(geometry, material);
    
    this.el.setObject3D('mesh', mesh);
  }
});

// 動画再生制御
AFRAME.registerComponent('video-handler', {
  init: function () {
    const colorVideo = document.querySelector("#manzai-color");
    const maskVideo = document.querySelector("#manzai-mask");
    
    this.el.addEventListener("targetFound", event => {
      console.log("マーカー認識");
      colorVideo.currentTime = 0;
      maskVideo.currentTime = 0;
      colorVideo.play();
      maskVideo.play();
    });
    
    this.el.addEventListener("targetLost", event => {
      console.log("マーカーロスト");
      colorVideo.pause();
      maskVideo.pause();
    });
  }
});
</script>
</head>
<body>
<a-scene mindar-image="imageTargetSrc: ./assets/marker.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
<a-assets>
<video id="manzai-color" src="./assets/manzai_color.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
<video id="manzai-mask" src="./assets/manzai_mask.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
</a-assets>
<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
<a-entity mindar-image-target="targetIndex: 0" video-handler>
<a-entity 
  position="0 0 0" 
  rotation="0 0 0"
  alpha-video="color: #manzai-color; mask: #manzai-mask; width: 4.5; height: 1.5"
></a-entity>
</a-entity>
</a-scene>
</body>
</html>
